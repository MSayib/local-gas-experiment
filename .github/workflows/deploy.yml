name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js (for Jest runtime)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run type-check

      - name: Run tests
        run: bun run test

      - name: Build bundle
        run: bun run build

      - name: Verify dist output
        run: |
          test -f dist/bundle.gs && echo "✅ bundle.gs exists" || (echo "❌ bundle.gs missing" && exit 1)
          test -f dist/index.html && echo "✅ index.html exists" || (echo "❌ index.html missing" && exit 1)
          test -f dist/appsscript.json && echo "✅ appsscript.json exists" || (echo "❌ appsscript.json missing" && exit 1)
          echo "📦 Bundle size: $(wc -c < dist/bundle.gs | tr -d ' ') bytes"
          echo "🌐 Client size: $(wc -c < dist/index.html | tr -d ' ') bytes"

  # ============================================
  # Deploy to GAS — run manually from local:
  #   bun run deploy
  #
  # Auto-deploy via CI requires either:
  # 1. Google OAuth consent screen in "Production" mode
  #    (refresh_token won't expire after 7 days)
  # 2. Service Account with Apps Script API access
  # ============================================
